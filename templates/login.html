{% extends "base.html" %}
{% block title %}Login · ExpenseTracker{% endblock %}
{% block content %}
<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-wallet2"></i>
      <h2>Welcome back</h2>
      <p>Sign in to track your expenses</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.88rem;color:var(--text-muted);">
      No account? <a href="{{ url_for('register') }}">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
