{% extends "base.html" %}
{% block title %}Sign Up · ExpenseTracker{% endblock %}
{% block content %}
<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-wallet2"></i>
      <h2>Create your account</h2>
      <p>Start tracking smarter today</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="johndoe" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
        <i class="bi bi-person-plus"></i> Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.88rem;color:var(--text-muted);">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
